spring.application.name=warehouse-inventory-service
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/warehouse_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT secret must match iam-service and api-gateway (use env var in production)
jwt.secret=${JWT_SECRET:medichain-super-secret-key-must-be-32-chars-min}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
 eureka.instance.hostname=localhost

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info

spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit breaker for notification-service
resilience4j.circuitbreaker.instances.notification-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.notification-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notification-service.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.notification-service.timeout-duration=3s

# Circuit breaker for product-supplier-service
resilience4j.circuitbreaker.instances.product-supplier-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.product-supplier-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-supplier-service.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.product-supplier-service.timeout-duration=3s

# Fast de-registration — stale instances removed within 10s instead of 90s
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10
