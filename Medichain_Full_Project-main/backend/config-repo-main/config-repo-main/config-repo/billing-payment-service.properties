server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/medichain_billing_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 eureka.instance.hostname=localhost

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# FIX: Feign + Circuit Breaker — was missing entirely.
#      DepartmentRequestValidationClient calls departmentrequest-service.
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.departmentrequest-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.departmentrequest-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentrequest-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.departmentrequest-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.departmentrequest-service.timeout-duration=3s

feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true