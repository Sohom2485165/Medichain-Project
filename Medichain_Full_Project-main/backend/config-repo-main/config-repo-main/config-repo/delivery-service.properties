spring.application.name=delivery-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/medichain_delivery_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html  

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.cloud.openfeign.circuitbreaker.enabled=true

spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-retries-on-same-service-instance=2
spring.cloud.loadbalancer.retry.max-retries-on-next-service-instance=1

feign.circuitbreaker.enabled=true
 
resilience4j.circuitbreaker.instances.departmentrequest-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.departmentrequest-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentrequest-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.departmentrequest-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.departmentrequest-service.timeout-duration=5s


