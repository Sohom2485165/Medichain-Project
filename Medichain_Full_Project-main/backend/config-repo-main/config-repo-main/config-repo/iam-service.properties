spring.application.name=iam-service
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/iam_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# JWT — must match api-gateway jwt.secret exactly
jwt.secret=medichain-super-secret-key-must-be-32-chars-min
jwt.expiration-seconds=3600
 eureka.instance.hostname=localhost

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Feign + circuit breaker
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j for notification-service circuit breaker
resilience4j.circuitbreaker.instances.notification-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.notification-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notification-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notification-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.notification-service.timeout-duration=3s

logging.level.com.medichain.iam=DEBUG
