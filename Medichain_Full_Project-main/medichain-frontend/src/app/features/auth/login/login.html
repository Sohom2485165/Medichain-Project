<div class="auth-wrapper">
  <div class="auth-card card p-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary mb-1">&#x2764; MediChain</h2>
      <p class="text-muted small">Hospital Supply &amp; Equipment Tracking</p>
    </div>

    @if (error) {
      <div class="alert alert-danger py-2 small">{{ error }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="Enter your email" />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="Enter your password" />
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
        Sign In
      </button>
    </form>

    <hr class="my-3" />
    <p class="text-center small text-muted mb-0">
      New user? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
