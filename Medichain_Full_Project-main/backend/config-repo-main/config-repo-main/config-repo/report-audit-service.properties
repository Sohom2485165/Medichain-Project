spring.application.name=report-audit-service

spring.datasource.url=jdbc:mysql://localhost:3306/medichain_report
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Feign + Circuit Breaker
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j — warehouse-inventory-service
resilience4j.circuitbreaker.instances.warehouse-inventory-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.warehouse-inventory-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.warehouse-inventory-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.warehouse-inventory-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.warehouse-inventory-service.timeout-duration=5s

# Resilience4j — delivery-service
resilience4j.circuitbreaker.instances.delivery-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.delivery-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.delivery-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.delivery-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.delivery-service.timeout-duration=5s

# Resilience4j — billing-payment-service
resilience4j.circuitbreaker.instances.billing-payment-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.billing-payment-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.billing-payment-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.billing-payment-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.billing-payment-service.timeout-duration=5s

# Resilience4j — departmentrequest-service
resilience4j.circuitbreaker.instances.departmentrequest-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.departmentrequest-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentrequest-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.departmentrequest-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.timelimiter.instances.departmentrequest-service.timeout-duration=5s

# Retry
report.retry.maxAttempts=3
report.retry.delay=3000

storage.base-dir=C:/Users/2485070/Desktop/Reports