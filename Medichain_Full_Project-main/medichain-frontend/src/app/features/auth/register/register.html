<div class="auth-wrapper">
  <div class="auth-card card p-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary mb-1">&#x2764; MediChain</h2>
      <p class="text-muted small">Create your account</p>
    </div>

    @if (error) { <div class="alert alert-danger py-2 small">{{ error }}</div> }
    @if (success) {
      <div class="alert alert-success py-2 small">
        {{ success }}
        <br><a routerLink="/login" class="fw-bold">Go to Login</a>
      </div>
    }

    @if (!success) {
      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" [(ngModel)]="name" name="name" required placeholder="Your full name" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="your@email.com" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone</label>
          <input type="tel" class="form-control" [(ngModel)]="phone" name="phone" required placeholder="10-digit mobile number" />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="Min 8 characters" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Register
        </button>
      </form>
    }

    <hr class="my-3" />
    <p class="text-center small text-muted mb-0">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
