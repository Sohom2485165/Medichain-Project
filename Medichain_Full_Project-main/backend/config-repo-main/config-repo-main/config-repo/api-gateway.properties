spring.application.name=api-gateway
server.port=8001
jwt.secret=medichain-super-secret-key-must-be-32-chars-min
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.client.registry-fetch-interval-seconds=5
 eureka.instance.hostname=localhost
spring.cloud.gateway.discovery.locator.enabled=false
 
spring.cloud.gateway.routes[0].id=iam-auth-route
spring.cloud.gateway.routes[0].uri=lb://iam-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=iam-admin-route
spring.cloud.gateway.routes[1].uri=lb://iam-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[2].id=notification-internal-route
spring.cloud.gateway.routes[2].uri=lb://notification-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/internal/notifications/**

spring.cloud.gateway.routes[3].id=notification-user-route
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**
 
spring.cloud.gateway.routes[4].id=report-audit-service
spring.cloud.gateway.routes[4].uri=lb://report-audit-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/reports/**,/api/audit-packages/**
spring.cloud.gateway.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[0].args.name=report-audit-service
spring.cloud.gateway.routes[4].filters[0].args.fallbackUri=forward:/fallback/report
 
spring.cloud.gateway.routes[5].id=kpi-service
spring.cloud.gateway.routes[5].uri=lb://kpi-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/kpi/**
spring.cloud.gateway.routes[5].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[0].args.name=kpi-service
spring.cloud.gateway.routes[5].filters[0].args.fallbackUri=forward:/fallback/kpi
 
spring.cloud.gateway.routes[6].id=departmentrequest-service
spring.cloud.gateway.routes[6].uri=lb://departmentrequest-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/department-requests/**
spring.cloud.gateway.routes[6].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[6].filters[0].args.name=departmentrequest-service
spring.cloud.gateway.routes[6].filters[0].args.fallbackUri=forward:/fallback/department-request
 
spring.cloud.gateway.routes[7].id=delivery-service
spring.cloud.gateway.routes[7].uri=lb://delivery-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/deliveries/**
spring.cloud.gateway.routes[7].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[7].filters[0].args.name=delivery-service
spring.cloud.gateway.routes[7].filters[0].args.fallbackUri=forward:/fallback/delivery
 
spring.cloud.gateway.routes[8].id=department-service
spring.cloud.gateway.routes[8].uri=lb://department-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/departments/**
spring.cloud.gateway.routes[8].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[8].filters[0].args.name=department-service
spring.cloud.gateway.routes[8].filters[0].args.fallbackUri=forward:/fallback/department
 
spring.cloud.gateway.routes[9].id=billing-invoices
spring.cloud.gateway.routes[9].uri=lb://billing-payment-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/invoices/**
 
spring.cloud.gateway.routes[10].id=billing-payments
spring.cloud.gateway.routes[10].uri=lb://billing-payment-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/payments/**
 
spring.cloud.gateway.routes[11].id=warehouse-service
spring.cloud.gateway.routes[11].uri=lb://warehouse-inventory-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/warehouse/**,/api/inventory/**,/api/stock/**
 
spring.cloud.gateway.routes[12].id=proof-of-receipt-route
spring.cloud.gateway.routes[12].uri=lb://delivery-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/proof-of-receipt/**
 
spring.cloud.gateway.routes[13].id=product-supplier-route
spring.cloud.gateway.routes[13].uri=lb://product-supplier-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/products/**,/api/suppliers/**,/api/orders/**,/api/purchase-requests/**
 
# Give load balancer time to warm up
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.retry.max-retries-on-same-service-instance=1
spring.cloud.loadbalancer.retry.max-retries-on-next-service-instance=1
spring.cloud.loadbalancer.cache.ttl=5s
 
# Increase circuit breaker timeout
resilience4j.timelimiter.configs.default.timeout-duration=15s
 
# Increase circuit breaker threshold so it doesn't open on first failure
resilience4j.circuitbreaker.configs.default.sliding-window-size=20
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
 
management.endpoints.web.exposure.include=health,info
