<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <span class="fw-semibold text-secondary" style="font-size:14px">Welcome,</span>
    <span class="fw-bold" style="font-size:15px">{{ name }}</span>
    <span class="role-badge" [ngClass]="'badge-' + role">{{ role }}</span>
  </div>
  <div class="d-flex align-items-center gap-3">
    <a routerLink="/notifications" class="position-relative text-secondary" style="text-decoration:none">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901z"/>
      </svg>
      @if (unreadCount > 0) {
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:10px">
          {{ unreadCount > 9 ? '9+' : unreadCount }}
        </span>
      }
    </a>
    <button class="btn btn-sm btn-outline-danger" (click)="logout()">Logout</button>
  </div>
</div>
